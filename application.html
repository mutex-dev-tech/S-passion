<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>S-passion Registration</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
      body {
        font-family: "Poppins", sans-serif;
        background: #f2f4f7;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .container {
        background: white;
        width: 100%;
        max-width: 480px;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }
      h1 {
        color: #1f1f9e;
        text-align: center;
      }
      form {
        margin-top: 20px;
      }
      label {
        font-weight: 500;
        margin-top: 10px;
        display: block;
      }
      input,
      select {
        width: 100%;
        padding: 10px;
        margin-top: 6px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 14px;
      }
      button {
        width: 100%;
        background: #1f1f9e;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 8px;
        font-size: 16px;
        margin-top: 20px;
        cursor: pointer;
        transition: 0.3s;
      }
      button:hover {
        background: #15157a;
      }
      .message {
        margin-top: 15px;
        padding: 10px;
        border-radius: 6px;
        background: #e9fce9;
        color: #067a06;
        font-weight: 500;
        display: none;
      }
      footer {
        margin-top: 15px;
        font-size: 12px;
        color: #777;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>S-passion Registration</h1>
      <p style="text-align: center; color: #555">
        Pay securely and notify via WhatsApp
      </p>

      <form id="regForm">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="Your name" required />

        <label>Email</label>
        <input type="email" id="email" value="S-passion@email.com" required />

        <label>Phone</label>
        <input type="tel" id="phone" value="08111761596" required />

        <label>Course</label>
        <select id="course" required>
          <option value="Graphic design">Graphic Design</option>
          <option value="Web development">Web Development</option>
          <option value="Data analysis">Data Analysis</option>
          <option value="Computer literacy">Computer Literacy</option>
          <option value="Computer repair and maintenance">
            Computer Repair and Maintenance
          </option>
        </select>

        <button type="submit">Pay with Paystack</button>
      </form>

      <div class="message" id="messageBox"></div>

      <footer>© 2025 S-passion ICT Academy. All rights reserved.</footer>
    </div>

    <script src="https://js.paystack.co/v1/inline.js"></script>
    <script>
      const PAYSTACK_PUBLIC_KEY = "pk_test"; // Replace with your real Paystack key
      const WHATSAPP_NUMBER = "234"; // no + sign

      const form = document.getElementById("regForm");
      const messageBox = document.getElementById("messageBox");

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const course = document.getElementById("course").value;

        if (!name || !email || !phone || !course) {
          showMessage("Please fill in all fields.", false);
          return;
        }

        const amount = 50000; // ₦500.00 in kobo
        let handler = PaystackPop.setup({
          key: PAYSTACK_PUBLIC_KEY,
          email: email,
          amount: amount,
          metadata: {
            custom_fields: [
              { display_name: "Full Name", variable_name: "name", value: name },
              { display_name: "Phone", variable_name: "phone", value: phone },
              {
                display_name: "Course",
                variable_name: "course",
                value: course,
              },
            ],
          },
          callback: function (response) {
            const reference = response.reference;
            showMessage("Payment successful! Registering...", true);
            const text = encodeURIComponent(
              `New registration from ${name} (Phone:${phone}, Email: ${email}) for ${course}. Paystack reference: ${reference}`,
            );

            const waUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${text}`;
            window.open(waUrl, "_blank");

            setTimeout(() => {
              showMessage(
                "✅ Registered successfully! WhatsApp notification opened.",
                true,
              );
              form.reset();
            }, 1500);
          },
          onClose: function () {
            showMessage(
              "Payment window closed. Registration not completed.",
              false,
            );
          },
        });

        handler.openIframe();
      });

      function showMessage(msg, success) {
        messageBox.style.display = "block";
        messageBox.style.background = success ? "#e9fce9" : "#fdeaea";
        messageBox.style.color = success ? "#067a06" : "#b30000";
        messageBox.innerText = msg;
      }
    </script>
  </body>
</html>
